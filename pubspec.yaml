name: clima_brasil
description: Um aplicativo moderno e responsivo para exibição de dados climáticos brasileiros.
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Gerenciamento de Estado
  provider: ^6.1.2
  shared_preferences: ^2.2.2

  # Cliente HTTP robusto
  dio: ^5.4.1

  # Localização do Usuário
  geolocator: ^10.1.0
  geocoding: ^2.1.1

  # Banco de Dados em Nuvem (Supabase)
  supabase_flutter: ^2.5.0

  # Gráficos de Temperatura/Precipitação
  fl_chart: ^0.66.0

  # Mapas de Satélite e Radar
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Recursos de Imagem, UI e Compartilhamento
  cached_network_image: ^3.3.1
  share_plus: ^7.2.1
  flutter_local_notifications: ^16.3.0
  intl: ^0.19.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
